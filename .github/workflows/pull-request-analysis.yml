name: Pull Request Analysis

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux Build And Test
  linux-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: "6.2"

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-${{ runner.arch }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  # macOS Build And Test
  macos-build-and-test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Verify Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-${{ runner.arch }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Test
        run: swift test
