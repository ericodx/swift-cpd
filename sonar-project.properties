# Project identification
sonar.projectKey=deploy-on-friday-swift-cpd
sonar.projectName=Swift Code Duplication Detector
sonar.projectDescription=Clone & Pattern Detector tool for Swift and Objective-C/C source code.
sonar.organization=deploy-on-friday

# Source code
sonar.sources=Sources

# Exclusions
sonar.exclusions=Tests/**/*,**/*Tests.swift,**/TestSupport/**/*

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.coverageReportPaths=coverage/code-coverage-report.xml

# Ignore hardcoded URI's issues
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
